rules:
  - id: SEC-001
    title: Hardcoded AWS Access Key
    description: >
      An AWS Access Key ID has been found hardcoded in source code.
    severity: CRITICAL
    category: SECRETS
    cwe: CWE-798
    owasp: "A07:2021 - Identification and Authentication Failures"
    languages: ["*"]
    remediation: >
      Remove the key immediately and rotate it in AWS IAM. Use environment variables
      or AWS Secrets Manager.
    patterns:
      - regex: "AKIA[0-9A-Z]{16}"
        confidence: HIGH
      - regex: "(?i)(aws_access_key_id|aws_secret_access_key)\\s*[=:]\\s*[A-Za-z0-9/+=]{20,}"
        confidence: HIGH

  - id: SEC-002
    title: Hardcoded Generic Secret or Password
    description: >
      A variable with a sensitive-sounding name has been assigned a hardcoded string value.
    severity: HIGH
    category: SECRETS
    cwe: CWE-798
    owasp: "A07:2021 - Identification and Authentication Failures"
    languages: ["*"]
    remediation: >
      Store secrets in environment variables or a secrets manager. Never commit credentials.
    patterns:
      - regex: "(?i)(password|passwd|secret|api_key|apikey|auth_token)\\s*=\\s*[\"'][^\"']{6,}[\"']"
        confidence: MEDIUM

  - id: SEC-003
    title: Private Key Material in Source
    description: >
      PEM-encoded private key material detected in source code.
    severity: CRITICAL
    category: SECRETS
    cwe: CWE-321
    owasp: "A02:2021 - Cryptographic Failures"
    languages: ["*"]
    remediation: >
      Never commit private keys to version control. Revoke and reissue any exposed keys.
    patterns:
      - regex: "-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
        confidence: HIGH

  - id: SEC-004
    title: Hardcoded JWT Secret
    description: >
      A JWT signing secret appears to be hardcoded in source code.
    severity: CRITICAL
    category: SECRETS
    cwe: CWE-798
    owasp: "A02:2021 - Cryptographic Failures"
    languages: ["*"]
    remediation: >
      Load the JWT secret from an environment variable or secrets manager.
    patterns:
      - regex: "(?i)(jwt_secret|jwt_key)\\s*[=:]\\s*[\"'][^\"']{6,}[\"']"
        confidence: HIGH

  - id: SEC-005
    title: GitHub Personal Access Token
    description: >
      A GitHub personal access token pattern was detected in source code.
    severity: HIGH
    category: SECRETS
    cwe: CWE-798
    owasp: "A07:2021 - Identification and Authentication Failures"
    languages: ["*"]
    remediation: >
      Revoke the token immediately and use environment variables instead.
    patterns:
      - regex: "ghp_[A-Za-z0-9]{36}"
        confidence: HIGH

  - id: SEC-006
    title: Database Connection String with Credentials
    description: >
      A database connection URI containing embedded credentials was found.
    severity: HIGH
    category: SECRETS
    cwe: CWE-798
    owasp: "A07:2021 - Identification and Authentication Failures"
    languages: ["*"]
    remediation: >
      Use environment variables for connection strings.
    patterns:
      - regex: "(mysql|postgresql|postgres|mongodb|redis|mssql)://[^:]+:[^@]+@"
        confidence: HIGH
